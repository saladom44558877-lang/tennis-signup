<!DOCTYPE html>
<html lang="zh-TW">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎾 教練後台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #1a1a1a; padding: 1rem; }
    .container { max-width: 720px; margin: 0 auto; }

    /* 登入 */
    .login-box { background: #fff; border-radius: 16px; padding: 2rem; max-width: 360px; margin: 4rem auto; box-shadow: 0 4px 16px rgba(0,0,0,.08); text-align: center; }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
    .login-input { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 14px; outline: none; margin-bottom: 12px; }
    .login-input:focus { border-color: #1d4ed8; }
    .login-btn { width: 100%; padding: 11px; background: #1d4ed8; color: #fff; border: none; border-radius: 9px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .login-btn:hover { background: #1e40af; }
    .login-err { color: #dc2626; font-size: 12px; margin-top: 8px; }

    /* 後台主體 */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header-title { font-size: 20px; font-weight: 700; }
    .logout-btn { font-size: 12px; color: #888; background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 20px; cursor: pointer; }

    /* 統計卡片 */
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
    .stat-n { font-size: 26px; font-weight: 700; }
    .stat-n.pending { color: #d97706; }
    .stat-n.paid { color: #16a34a; }
    .stat-n.cancel { color: #dc2626; }
    .stat-l { font-size: 12px; color: #888; margin-top: 2px; }

    /* 篩選 */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid #e2e8f0; font-size: 12px; cursor: pointer; background: #fff; color: #666; font-weight: 500; }
    .filter-btn.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

    /* 報名卡片 */
    .reg-card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.05); border-left: 4px solid #e2e8f0; }
    .reg-card.pending { border-left-color: #f59e0b; }
    .reg-card.paid { border-left-color: #22c55e; }
    .reg-card.cancel { border-left-color: #ef4444; opacity: .6; }
    .reg-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .reg-name { font-size: 16px; font-weight: 700; }
    .reg-status { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-paid { background: #dcfce7; color: #166534; }
    .status-cancel { background: #fee2e2; color: #991b1b; }
    .reg-info { font-size: 12px; color: #555; line-height: 2; }
    .reg-info b { color: #1a1a1a; }
    .reg-slots { font-size: 11px; color: #666; background: #f8fafc; border-radius: 8px; padding: 8px 10px; margin: 8px 0; line-height: 1.9; border: 1px solid #e2e8f0; }
    .reg-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-confirm { flex: 1; padding: 9px; background: #16a34a; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-confirm:hover { background: #15803d; }
    .btn-cancel { flex: 1; padding: 9px; background: #fff; color: #dc2626; border: 1.5px solid #dc2626; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-cancel:hover { background: #fee2e2; }

    .empty { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
    .refresh-btn { padding: 7px 16px; background: #1d4ed8; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .loading { text-align: center; padding: 2rem; color: #888; }

    /* 繳費單按鈕 */
    .btn-invoice { flex: 1; padding: 9px; background: #fff; color: #7c3aed; border: 1.5px solid #7c3aed; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-invoice:hover { background: #f5f3ff; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 440px; max-height: 92vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,.25); }
    .modal-hd { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; background: #fff; z-index: 1; border-radius: 16px 16px 0 0; }
    .modal-hd-title { font-size: 14px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 22px; line-height: 1; cursor: pointer; color: #aaa; }
    .modal-close:hover { color: #555; }
    .inv { padding: 18px; }
    .inv-hero { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .inv-icon { width: 44px; height: 44px; background: linear-gradient(135deg,#4f46e5,#7c3aed); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .inv-title { font-size: 16px; font-weight: 800; color: #111; }
    .inv-subtitle { font-size: 11px; color: #888; margin-top: 2px; }
    .inv-block { background: #f8fafc; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
    .inv-block-title { font-size: 10px; font-weight: 700; color: #6b7280; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 9px; }
    .inv-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; margin-bottom: 6px; }
    .inv-row:last-child { margin-bottom: 0; }
    .inv-label { color: #6b7280; flex-shrink: 0; margin-right: 8px; }
    .inv-val { font-weight: 600; color: #111; text-align: right; }
    .inv-val.accent { color: #7c3aed; }
    .inv-total { background: linear-gradient(135deg,#4f46e5,#7c3aed); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .inv-total-label { font-size: 13px; color: rgba(255,255,255,.85); font-weight: 600; }
    .inv-total-amount { font-size: 24px; font-weight: 800; color: #fff; }
    .inv-bank { background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
    .inv-bank-title { font-size: 10px; font-weight: 700; color: #1d4ed8; letter-spacing: .08em; margin-bottom: 9px; }
    .inv-bank-row { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 6px; }
    .inv-bank-row:last-child { margin-bottom: 0; }
    .inv-bank-label { color: #3b82f6; }
    .inv-bank-val { font-weight: 700; color: #1e3a8a; font-family: 'Courier New', monospace; letter-spacing: .04em; }
    .inv-note { background: #fef9c3; border-radius: 8px; padding: 10px 13px; font-size: 12px; color: #78350f; line-height: 1.7; }
    .modal-ft { display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid #f1f5f9; position: sticky; bottom: 0; background: #fff; border-radius: 0 0 16px 16px; }
    .modal-ft button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
    .btn-copy-inv { background: #f1f5f9; color: #374151; }
    .btn-copy-inv:hover { background: #e2e8f0; }
    .btn-print-inv { background: linear-gradient(135deg,#4f46e5,#7c3aed); color: #fff; }
    @media print {
      body > *:not(#invoice-modal) { display: none !important; }
      #invoice-modal { display: block !important; position: static !important; background: none !important; padding: 0 !important; }
      .modal-box { box-shadow: none !important; max-height: none !important; }
      .modal-hd, .modal-ft { display: none !important; }
    }
  </style>
</head>

<!-- 繳費單 Modal -->
<div class="modal-overlay" id="invoice-modal" onclick="if(event.target===this)closeInvoice()">
  <div class="modal-box">
    <div class="modal-hd">
      <div class="modal-hd-title">📋 繳費單</div>
      <button class="modal-close" onclick="closeInvoice()">×</button>
    </div>
    <div id="invoice-content"></div>
    <div class="modal-ft">
      <button class="btn-copy-inv" onclick="copyInvoiceText()">📋 複製文字</button>
      <button class="btn-print-inv" onclick="saveInvoiceImage()">📸 儲存圖片</button>
    </div>
  </div>
</div>
<div class="container">

  <!-- 登入 -->
  <div id="login-box" class="login-box">
    <div style="font-size:36px;margin-bottom:10px;">🎾</div>
    <div class="login-title">教練後台</div>
    <div class="login-sub">請輸入管理密碼</div>
    <input id="pass-input" class="login-input" type="password" placeholder="密碼" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">登入</button>
    <div class="login-err" id="login-err"></div>
  </div>

  <!-- 後台主體 -->
  <div id="admin-body" style="display:none;">
    <div class="header">
      <div class="header-title">🎾 報名管理</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="refresh-btn" onclick="loadData()">🔄 重新整理</button>
        <button class="logout-btn" onclick="logout()">登出</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-n pending" id="cnt-pending">-</div><div class="stat-l">⏳ 待確認</div></div>
      <div class="stat"><div class="stat-n paid"    id="cnt-paid">-</div><div class="stat-l">✅ 已繳費</div></div>
      <div class="stat"><div class="stat-n cancel"  id="cnt-cancel">-</div><div class="stat-l">❌ 已取消</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">⏳ 待確認</button>
      <button class="filter-btn" onclick="setFilter('paid',this)">✅ 已繳費</button>
      <button class="filter-btn" onclick="setFilter('cancel',this)">❌ 已取消</button>
    </div>

    <div id="reg-list"><div class="loading">載入中...</div></div>
  </div>

</div>

const SLOT_LABELS = Object.fromEntries(Object.entries(SLOT_INFO).map(([k,v])=>[k,v.label]));

// 雙教練課：第二個 court 的 key alias 到第一個 court（顯示時合併為同一堂）
const SLOT_ALIAS = {
  's-9-1': 's-9-0',  // 09/01(二) 19:00-20:00 court5 → 同堂為 court6
};

// 將時段字串中的 key 解碼為可讀標籤，雙教練重複時段自動去重
function decodeSlotStr(str) {
  if (!str || str === '—') return str;
  const seen = new Set();
  return str.split(/\n|,/).map(s => {
    const raw = s.trim();
    const k = SLOT_ALIAS[raw] || raw;   // alias 替換
    const label = SLOT_LABELS[k] || k;
    if (seen.has(label)) return null;   // 去重：同標籤只顯示一次
    seen.add(label);
    return label;
  }).filter(Boolean).join('\n');
}

let adminPass = '';
let allRows = [];
let curFilter = 'all';

function login() {
  const pass = document.getElementById('pass-input').value.trim();
  if (!pass) return;
  adminPass = pass;
  loadData();
}

function logout() {
  adminPass = '';
  allRows = [];
  document.getElementById('login-box').style.display = 'block';
  document.getElementById('admin-body').style.display = 'none';
  document.getElementById('pass-input').value = '';
}

async function loadData() {
  document.getElementById('reg-list').innerHTML = '<div class="loading">載入中...</div>';
  try {
    const res = await fetch(`${GAS_URL}?action=getAdmin&pass=${encodeURIComponent(adminPass)}`);
    const data = await res.json();
    if (data.error) {
      document.getElementById('login-err').textContent = data.error;
      return;
    }
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('admin-body').style.display = 'block';
    document.getElementById('login-err').textContent = '';
    allRows = data.rows || [];
    renderStats();
    renderList();
  } catch(e) {
    document.getElementById('reg-list').innerHTML = '<div class="empty">載入失敗，請重試</div>';
  }
}

function renderStats() {
  const pending = allRows.filter(r => r.status === '待確認').length;
  const paid    = allRows.filter(r => r.status === '已繳費✅').length;
  const cancel  = allRows.filter(r => r.status === '已取消❌').length;
  document.getElementById('cnt-pending').textContent = pending;
  document.getElementById('cnt-paid').textContent    = paid;
  document.getElementById('cnt-cancel').textContent  = cancel;
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const filtered = allRows.filter(r => {
    if (curFilter === 'all') return true;
    if (curFilter === 'pending') return r.status === '待確認';
    if (curFilter === 'paid')    return r.status === '已繳費✅';
    if (curFilter === 'cancel')  return r.status === '已取消❌';
    return true;
  }).reverse(); // 最新在最上面

  if (filtered.length === 0) {
    document.getElementById('reg-list').innerHTML = '<div class="empty">沒有符合的報名記錄</div>';
    return;
  }

  const statusClass = { '待確認':'pending', '已繳費✅':'paid', '已取消❌':'cancel' };
  const statusBadge = { '待確認':'status-pending', '已繳費✅':'status-paid', '已取消❌':'status-cancel' };

  document.getElementById('reg-list').innerHTML = filtered.map(r => {
    const sc = statusClass[r.status] || 'pending';
    const sb = statusBadge[r.status] || 'status-pending';
    const isPending = r.status === '待確認';
    const isCancelled = r.status === '已取消❌';
    // 解碼時段 key → 可讀格式
    const slotsDisplay   = decodeSlotStr(r.slots   || '');
    const waitlistDisplay = decodeSlotStr(r.waitlist || '');
    return `<div class="reg-card ${sc}">
      <div class="reg-top">
        <div>
          <div class="reg-name">${r.name}</div>
          ${r.orderId ? `<div style="font-size:11px;color:#888;margin-top:2px;">${r.orderId}</div>` : ''}
        </div>
        <span class="reg-status ${sb}">${r.status}</span>
      </div>
      <div class="reg-info">
        <b>LINE：</b>${r.line || '—'} ｜ <b>電話：</b>${r.phone || '—'}<br>
        <b>程度：</b>${r.level} ｜ <b>課程費：</b>${r.fee}${r.discount !== '—' ? '（折扣 '+r.discount+'）' : ''}<br>
        <b>堂數：</b>小班 ${r.small} 堂・大班 ${r.big} 堂・對打 ${r.rally} 堂<br>
        <b>團體賽：</b>${r.tournament || '—'} ｜ <b>報名時間：</b>${r.time}
      </div>
      ${slotsDisplay ? `<div class="reg-slots"><b>正選時段：</b><br>${slotsDisplay.replace(/\n/g,'<br>')}</div>` : ''}
      ${waitlistDisplay ? `<div class="reg-slots" style="background:#faf5ff;border-color:#e9d5ff;"><b>候補時段：</b><br>${waitlistDisplay.replace(/\n/g,'<br>')}</div>` : ''}
      ${!isCancelled ? `<div class="reg-actions">
        ${isPending ? `<button class="btn-confirm" onclick="confirmPayment(${r.rowIndex})">✅ 確認已繳費</button>` : '<div style="flex:1;"></div>'}
        <button class="btn-invoice" onclick='showInvoice(${JSON.stringify(r).replace(/'/g,"&#39;")})'>📋 繳費單</button>
        <button class="btn-cancel" onclick="cancelReg(${r.rowIndex})">${isPending ? '❌ 取消報名' : '🔄 標記取消'}</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

async function confirmPayment(rowIndex) {
  if (!window.confirm('確認這位學員已繳費？名額將正式扣除。')) return;
  try {
    const res = await fetch(`${GAS_URL}?action=confirm&rowIndex=${rowIndex}&pass=${encodeURIComponent(adminPass)}`);
    const data = await res.json();
    if (data.status === 'ok' || data.status === 'already_paid') {
      await loadData();
    }
  } catch(e) { alert('操作失敗，請重試'); }
}

async function cancelReg(rowIndex) {
  if (!window.confirm('確定要取消這筆報名？')) return;
  try {
    const res = await fetch(`${GAS_URL}?action=cancel&rowIndex=${rowIndex}&pass=${encodeURIComponent(adminPass)}`);
    const data = await res.json();
    if (data.status === 'ok') await loadData();
  } catch(e) { alert('操作失敗，請重試'); }
}

function showInvoice(r) {
  const levelMap = { 'beginner':'初階班', 'mid':'中階班', '1v1':'對打班' };
  const levelLabel = levelMap[r.level] || r.level || '—';

  const small = parseInt(r.small) || 0;
  const big   = parseInt(r.big)   || 0;
  const rally = parseInt(r.rally) || 0;
  const totalClasses = small + big + rally;
  const parts = [];
  if (small > 0) parts.push(`小班 ${small} 堂`);
  if (big   > 0) parts.push(`大班 ${big} 堂`);
  if (rally > 0) parts.push(`對打 ${rally} 堂`);
  const classCount = parts.join('・') || '—';

  // 費用與折扣計算
  const feeRaw = parseFloat(String(r.fee).replace(/[^0-9.]/g, '')) || 0;
  const hasDiscount = totalClasses >= 6;
  const discountAmt = hasDiscount ? Math.round(feeRaw * 0.05) : 0;
  const finalFee    = hasDiscount ? Math.round(feeRaw * 0.95) : feeRaw;
  const feeDisplay      = `NT$ ${feeRaw.toLocaleString()}`;
  const discountDisplay = `- NT$ ${discountAmt.toLocaleString()}`;
  const finalDisplay    = `NT$ ${finalFee.toLocaleString()}`;

  // 團體賽資格
  const tournamentVal   = (r.tournament || '').toLowerCase();
  const wantsTournament = tournamentVal === 'yes' || tournamentVal === 'maybe';

  // 時段：解碼成物件陣列，含班別/教練

  function decodeToItems(str) {
    if (!str || str === '—') return [];
    const seen = new Set();
    return str.split(/\n|,/).map(s => {
      const raw  = s.trim();
      const k    = SLOT_ALIAS[raw] || raw;
      const info = SLOT_INFO[k] || SLOT_BY_LABEL[raw];
      if (!info) return { label: raw, date: raw, time: '', cls: '', coach: '' };
      if (seen.has(info.label)) return null;
      seen.add(info.label);
      return info;
    }).filter(Boolean);

  const slotItems = decodeToItems(r.slots    || '');
  const waitItems = decodeToItems(r.waitlist || '');

    : '<div class="inv-row"><span class="inv-val">—</span></div>';

  const slotsHtml = toCards(slotItems);
  const waitHtml  = waitItems.length ? toCards(waitItems) : null;

  // 純文字（複製用）
  const slotsTxt = slotItems.length
    ? slotItems.map(s => `  ・${s.date} ${s.time} ${s.cls}・${s.coach}`).join('\n')
    : '  —';
  const tournamentTxt = hasDiscount && wantsTournament
    ? '\n🎾 符合免費參加 12/23-24 團體賽資格！'
    : hasDiscount && !wantsTournament
    ? '\n（已達6堂，可免費參加 12/23-24 團體賽，如有意願請告知教練）'
    : '';

  invoiceTextCache =
`🎾 網球課程繳費單
━━━━━━━━━━━━━━━
學員姓名：${r.name}

━━━━━━━━━━━━━━━
【課程資訊】
班別：${levelLabel}

${slotsTxt}

    <div class="inv-block">
      <div class="inv-block-title">學員資訊</div>
      <div class="inv-row"><span class="inv-label">姓名</span><span class="inv-val">${r.name}</span></div>
      <div class="inv-row"><span class="inv-label">LINE ID</span><span class="inv-val">${r.line || '—'}</span></div>
      <div class="inv-row"><span class="inv-label">電話</span><span class="inv-val">${r.phone || '—'}</span></div>

    </div>

      <div class="inv-block-title">正選時段</div>
      ${slotsHtml}
    </div>
    ${waitHtml ? `<div class="inv-block" style="background:#faf5ff;border:1px solid #e9d5ff;">
      <div class="inv-block-title" style="color:#7c3aed;">候補時段</div>

      <div class="inv-row"><span class="inv-label">課程原價</span><span class="inv-val">${feeDisplay}</span></div>
      ${hasDiscount ? `<div class="inv-row"><span class="inv-label">95折優惠</span><span class="inv-val" style="color:#16a34a;">${discountDisplay}</span></div>` : ''}
    </div>
    <div class="inv-total">
      <div class="inv-total-label">應繳總額</div>
      <div class="inv-total-amount">${finalDisplay}</div>
    </div>
    ${hasDiscount && wantsTournament ? `

      <span style="font-size:20px;">🎾</span>
      <div>
        <div style="font-size:12px;font-weight:700;color:#166534;">符合免費團體賽資格！</div>

function saveInvoiceImage() {

function copyInvoiceText() {
  navigator.clipboard.writeText(invoiceTextCache).then(() => {
    const btn = document.querySelector('.btn-copy-inv');
    const orig = btn.textContent;
    btn.textContent = '✅ 已複製！';
    setTimeout(() => btn.textContent = orig, 1800);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = invoiceTextCache;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
