<!DOCTYPE html>
<html lang="zh-TW">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎾 教練後台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #1a1a1a; padding: 1rem; }
    .container { max-width: 1000px; margin: 0 auto; }

    /* 登入 */
    .login-box { background: #fff; border-radius: 16px; padding: 2rem; max-width: 360px; margin: 4rem auto; box-shadow: 0 4px 16px rgba(0,0,0,.08); text-align: center; }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
    .login-input { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 14px; outline: none; margin-bottom: 12px; }
    .login-input:focus { border-color: #1d4ed8; }
    .login-btn { width: 100%; padding: 11px; background: #1d4ed8; color: #fff; border: none; border-radius: 9px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .login-btn:hover { background: #1e40af; }
    .login-err { color: #dc2626; font-size: 12px; margin-top: 8px; }

    /* 標籤頁 */
    .tabs { display: flex; gap: 8px; border-bottom: 2px solid #e2e8f0; margin-bottom: 1.5rem; }
    .tab-btn { padding: 12px 20px; background: none; border: none; font-size: 14px; font-weight: 600; color: #888; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab-btn.active { color: #1d4ed8; border-bottom-color: #1d4ed8; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 後台主體 */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header-title { font-size: 20px; font-weight: 700; }
    .logout-btn { font-size: 12px; color: #888; background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 20px; cursor: pointer; }

    /* 統計卡片 */
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
    .stat-n { font-size: 26px; font-weight: 700; }
    .stat-n.pending { color: #d97706; }
    .stat-n.paid { color: #16a34a; }
    .stat-n.cancel { color: #dc2626; }
    .stat-l { font-size: 12px; color: #888; margin-top: 2px; }

    /* 篩選 */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid #e2e8f0; font-size: 12px; cursor: pointer; background: #fff; color: #666; font-weight: 500; }
    .filter-btn.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

    /* 報名卡片 */
    .reg-card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.05); border-left: 4px solid #e2e8f0; }
    .reg-card.pending { border-left-color: #f59e0b; }
    .reg-card.paid { border-left-color: #22c55e; }
    .reg-card.cancel { border-left-color: #ef4444; opacity: .6; }
    .reg-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .reg-name { font-size: 16px; font-weight: 700; }
    .reg-status { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-paid { background: #dcfce7; color: #166534; }
    .status-cancel { background: #fee2e2; color: #991b1b; }
    .reg-info { font-size: 12px; color: #555; line-height: 2; }
    .reg-info b { color: #1a1a1a; }
    .reg-slots { font-size: 11px; color: #666; background: #f8fafc; border-radius: 8px; padding: 8px 10px; margin: 8px 0; line-height: 1.9; border: 1px solid #e2e8f0; }
    .reg-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-confirm { flex: 1; padding: 9px; background: #16a34a; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-confirm:hover { background: #15803d; }
    .btn-cancel { flex: 1; padding: 9px; background: #fff; color: #dc2626; border: 1.5px solid #dc2626; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-cancel:hover { background: #fee2e2; }

    .empty { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
    .refresh-btn { padding: 7px 16px; background: #1d4ed8; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .loading { text-align: center; padding: 2rem; color: #888; }

    /* 繳費單按鈕 */
    .btn-invoice { flex: 1; padding: 9px; background: #fff; color: #7c3aed; border: 1.5px solid #7c3aed; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-invoice:hover { background: #f5f3ff; }

    /* ========== 課程儀表板樣式 ========== */
    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .course-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.05); border-left: 4px solid #7c3aed; }
    .course-header { background: #f8fafc; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
    .course-date { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .course-info { font-size: 12px; color: #666; margin-top: 4px; }
    .course-body { padding: 12px 16px; }
    .course-meta { font-size: 11px; color: #666; margin-bottom: 8px; line-height: 1.8; }
    .course-meta b { color: #1a1a1a; font-weight: 600; }
    .student-list { margin-bottom: 12px; }
    .student-item { font-size: 12px; padding: 4px 0; color: #555; }
    .student-item::before { content: "👤 "; margin-right: 4px; }
    .student-paid { color: #16a34a; font-weight: 500; }
    .course-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-small { flex: 1; min-width: 90px; padding: 8px 12px; background: #1d4ed8; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-small:hover { background: #1e40af; }
    .btn-small.secondary { background: #fff; color: #7c3aed; border: 1px solid #7c3aed; }
    .btn-small.secondary:hover { background: #f5f3ff; }
    .btn-small.danger { background: #dc2626; }
    .btn-small.danger:hover { background: #b91c1c; }

    /* ========== 實際上課表單 ========== */
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #1a1a1a; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: inherit; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #1d4ed8; }
    .form-textarea { resize: vertical; min-height: 80px; }
    .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; }
    .checkbox-item input { margin-right: 8px; cursor: pointer; }
    .checkbox-item label { cursor: pointer; font-size: 13px; }
    .btn-submit { padding: 12px 24px; background: #16a34a; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-submit:hover { background: #15803d; }

    /* ========== 停課表單 ========== */
    .radio-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
    .radio-item { display: flex; align-items: center; }
    .radio-item input { margin-right: 8px; cursor: pointer; }
    .radio-item label { cursor: pointer; font-size: 13px; }
    .refund-list { background: #f8fafc; border-radius: 8px; padding: 12px; margin-top: 12px; }
    .refund-item { font-size: 12px; padding: 8px 0; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
    .refund-item:last-child { border-bottom: none; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 440px; max-height: 92vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,.25); }
    .modal-hd { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; background: #fff; z-index: 1; border-radius: 16px 16px 0 0; }
    .modal-hd-title { font-size: 14px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 22px; line-height: 1; cursor: pointer; color: #aaa; }
    .modal-close:hover { color: #555; }
    .inv { padding: 18px; }
    .inv-hero { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .inv-icon { width: 44px; height: 44px; background: linear-gradient(135deg,#4f46e5,#7c3aed); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .inv-title { font-size: 16px; font-weight: 800; color: #111; }
    .inv-subtitle { font-size: 11px; color: #888; margin-top: 2px; }
    .inv-block { background: #f8fafc; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
    .inv-block-title { font-size: 10px; font-weight: 700; color: #6b7280; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 9px; }
    .inv-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; margin-bottom: 6px; }
    .inv-row:last-child { margin-bottom: 0; }
    .inv-label { color: #6b7280; flex-shrink: 0; margin-right: 8px; }
    .inv-val { font-weight: 600; color: #111; text-align: right; }
    .inv-val.accent { color: #7c3aed; }
    .inv-total { background: linear-gradient(135deg,#4f46e5,#7c3aed); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .inv-total-label { font-size: 13px; color: rgba(255,255,255,.85); font-weight: 600; }
    .inv-total-amount { font-size: 24px; font-weight: 800; color: #fff; }
    .inv-bank { background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
    .inv-bank-title { font-size: 10px; font-weight: 700; color: #1d4ed8; letter-spacing: .08em; margin-bottom: 9px; }
    .inv-bank-row { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 6px; }
    .inv-bank-row:last-child { margin-bottom: 0; }
    .inv-bank-label { color: #3b82f6; }
    .inv-bank-val { font-weight: 700; color: #1e3a8a; font-family: 'Courier New', monospace; letter-spacing: .04em; }
    .inv-note { background: #fef9c3; border-radius: 8px; padding: 10px 13px; font-size: 12px; color: #78350f; line-height: 1.7; }
    .modal-ft { display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid #f1f5f9; position: sticky; bottom: 0; background: #fff; border-radius: 0 0 16px 16px; }
    .modal-ft button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
    .btn-copy-inv { background: #f1f5f9; color: #374151; }
    .btn-copy-inv:hover { background: #e2e8f0; }
    .btn-print-inv { background: linear-gradient(135deg,#4f46e5,#7c3aed); color: #fff; }
    @media print {
      body > *:not(#invoice-modal) { display: none !important; }
      #invoice-modal { display: block !important; position: static !important; background: none !important; padding: 0 !important; }
      .modal-box { box-shadow: none !important; max-height: none !important; }
      .modal-hd, .modal-ft { display: none !important; }
    }
  </style>
</head>
<body>

<!-- 繳費單 Modal -->
<div class="modal-overlay" id="invoice-modal" onclick="if(event.target===this)closeInvoice()">
  <div class="modal-box">
    <div class="modal-hd">
      <div class="modal-hd-title">📋 繳費單</div>
      <button class="modal-close" onclick="closeInvoice()">×</button>
    </div>
    <div id="invoice-content"></div>
    <div class="modal-ft">
      <button class="btn-copy-inv" onclick="copyInvoiceText()">📋 複製文字</button>
      <button class="btn-print-inv" onclick="saveInvoiceImage()">📸 儲存圖片</button>
    </div>
  </div>
</div>

<!-- 提醒訊息 Modal -->
<div class="modal-overlay" id="reminder-modal" onclick="if(event.target===this)closeReminder()">
  <div class="modal-box">
    <div class="modal-hd">
      <div class="modal-hd-title">📢 課程提醒訊息</div>
      <button class="modal-close" onclick="closeReminder()">×</button>
    </div>
    <div class="inv" id="reminder-content" style="white-space: pre-wrap; font-family: monospace; font-size: 12px; line-height: 1.8; color: #1a1a1a;"></div>
    <div class="modal-ft">
      <button class="btn-copy-inv" onclick="copyReminderText()">📋 複製訊息</button>
      <button class="btn-print-inv" onclick="closeReminder()">✓ 關閉</button>
    </div>
  </div>
</div>

<div class="container">

  <!-- 登入 -->
  <div id="login-box" class="login-box">
    <div style="font-size:36px;margin-bottom:10px;">🎾</div>
    <div class="login-title">教練後台</div>
    <div class="login-sub">請輸入管理密碼</div>
    <input id="pass-input" class="login-input" type="password" placeholder="密碼" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">登入</button>
    <div class="login-err" id="login-err"></div>
  </div>

  <!-- 後台主體 -->
  <div id="admin-body" style="display:none;">
    <div class="header">
      <div class="header-title">🎾 教練管理平台</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="refresh-btn" onclick="loadData()">🔄 重新整理</button>
        <button class="logout-btn" onclick="logout()">登出</button>
      </div>
    </div>

    <!-- 標籤頁 -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('registration')">📋 報名管理</button>
      <button class="tab-btn" onclick="switchTab('schedule')">📅 課程儀表板</button>
      <button class="tab-btn" onclick="switchTab('attendance')">✓ 實際上課</button>
      <button class="tab-btn" onclick="switchTab('cancellation')">❌ 停課記錄</button>
    </div>

    <!-- ========== 報名管理分頁 ========== -->
    <div id="tab-registration" class="tab-content active">
      <div class="stats">
        <div class="stat">
          <div class="stat-n pending" id="stat-pending">0</div>
          <div class="stat-l">待繳費</div>
        </div>
        <div class="stat">
          <div class="stat-n paid" id="stat-paid">0</div>
          <div class="stat-l">已繳費</div>
        </div>
        <div class="stat">
          <div class="stat-n cancel" id="stat-cancel">0</div>
          <div class="stat-l">已取消</div>
        </div>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterStatus('all')">全部</button>
        <button class="filter-btn" onclick="filterStatus('pending')">待繳費</button>
        <button class="filter-btn" onclick="filterStatus('paid')">已繳費</button>
        <button class="filter-btn" onclick="filterStatus('cancel')">已取消</button>
      </div>

      <div id="reg-list"></div>
    </div>

    <!-- ========== 課程儀表板分頁 ========== -->
    <div id="tab-schedule" class="tab-content">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterScheduleMonth('all')">全月</button>
        <button class="filter-btn" onclick="filterScheduleMonth('07')">7月</button>
        <button class="filter-btn" onclick="filterScheduleMonth('08')">8月</button>
        <button class="filter-btn" onclick="filterScheduleMonth('09')">9月</button>
        <button class="filter-btn" onclick="filterScheduleMonth('10')">10月</button>
        <button class="filter-btn" onclick="filterScheduleMonth('11')">11月</button>
        <button class="filter-btn" onclick="filterScheduleMonth('12')">12月</button>
      </div>
      <div id="schedule-grid" class="course-grid"></div>
    </div>

    <!-- ========== 實際上課分頁 ========== -->
    <div id="tab-attendance" class="tab-content">
      <div style="background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.05);">
        <h3 style="margin-bottom:1.5rem;font-size:16px;font-weight:700;">📝 記錄實際上課</h3>
        
        <div class="form-group">
          <label class="form-label">選擇課程日期</label>
          <select id="attendance-date" class="form-select" onchange="loadAttendanceSlots()">
            <option value="">— 選擇日期 —</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">選擇時段</label>
          <select id="attendance-slot" class="form-select">
            <option value="">— 選擇時段 —</option>
          </select>
        </div>

        <div id="attendance-students" style="margin-bottom:1.5rem;"></div>

        <div class="form-group">
          <label class="form-label">備註</label>
          <textarea id="attendance-notes" class="form-textarea" placeholder="例如：天氣良好、全員準時到達..."></textarea>
        </div>

        <button class="btn-submit" onclick="saveAttendance()">✓ 保存上課記錄</button>
        <div id="attendance-msg" style="margin-top:1rem;font-size:12px;"></div>
      </div>
    </div>

    <!-- ========== 停課記錄分頁 ========== -->
    <div id="tab-cancellation" class="tab-content">
      <div style="background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.05);">
        <h3 style="margin-bottom:1.5rem;font-size:16px;font-weight:700;">⚠️ 停課記錄</h3>
        
        <div class="form-group">
          <label class="form-label">停課原因</label>
          <div class="radio-group">
            <div class="radio-item">
              <input type="radio" id="reason-rain" name="cancel-reason" value="下雨">
              <label for="reason-rain">下雨</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="reason-court" name="cancel-reason" value="場地問題">
              <label for="reason-court">場地問題</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="reason-coach" name="cancel-reason" value="教練病假">
              <label for="reason-coach">教練病假</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="reason-other" name="cancel-reason" value="其他">
              <label for="reason-other">其他</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">選擇停課日期</label>
          <div id="cancellation-dates" class="checkbox-group"></div>
        </div>

        <div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:12px;margin-bottom:1.5rem;">
          <div style="font-size:12px;color:#92400e;line-height:1.6;">
            <b>⚠️ 提示：</b>系統會自動計算受影響學生的退費金額（已扣除手續費 $15）。
          </div>
        </div>

        <button class="btn-submit" style="background:#dc2626;" onclick="previewCancellation()">👁️ 預覽退費清單</button>
        <button class="btn-submit" style="background:#dc2626;margin-left:8px;" onclick="saveCancellation()">❌ 標記停課</button>

        <div id="refund-preview" style="margin-top:1.5rem;"></div>
        <div id="cancellation-msg" style="margin-top:1rem;font-size:12px;"></div>
      </div>
    </div>

  </div>
</div>

<script>
// =============================================
// 全域變數
// =============================================
let currentStatus = 'all';
let currentScheduleMonth = 'all';
let adminData = [];
let scheduleData = [];
let currentInvoiceName = '';
let invoiceTextCache = '';
let reminderMessageCache = '';

// GAS 部署 URL（已改正）
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxddtd_CFTtvDCBd1aLe9ve7MJ_tVLG-5Uy3XLyzL_DQjHgpElpcTPrFzZ6mDY90SzeoQ/exec';
const ADMIN_PASS = 'adam2026';

// =============================================
// 登入
// =============================================
function login() {
  const pass = document.getElementById('pass-input').value;
  if (pass !== ADMIN_PASS) {
    document.getElementById('login-err').textContent = '密碼錯誤';
    return;
  }
  
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('admin-body').style.display = 'block';
  loadData();
}

function logout() {
  document.getElementById('admin-body').style.display = 'none';
  document.getElementById('login-box').style.display = 'block';
  document.getElementById('pass-input').value = '';
}

// =============================================
// 標籤頁切換
// =============================================
function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tabName).classList.add('active');
  event.target.classList.add('active');
  
  if (tabName === 'schedule') {
    loadSchedule();
  } else if (tabName === 'attendance') {
    loadAttendanceForm();
  } else if (tabName === 'cancellation') {
    loadCancellationForm();
  }
}

// =============================================
// 載入主要數據
// =============================================
async function loadData() {
  try {
    // 1. 載入報名數據
    const response = await fetch(`${GAS_URL}?action=getAdmin&pass=${ADMIN_PASS}`);
    const result = await response.json();
    
    if (result.error) {
      alert('授權失敗');
      return;
    }
    
    adminData = result.rows || [];
    updateStats();
    renderRegistrations();
    
    // 2. 載入課程時間表
    loadSchedule();
    
  } catch (err) {
    console.error('Error loading data:', err);
    alert('載入失敗');
  }
}

// =============================================
// 更新統計
// =============================================
function updateStats() {
  const pending = adminData.filter(r => r.status === '待確認').length;
  const paid = adminData.filter(r => r.status === '已繳費✅').length;
  const cancel = adminData.filter(r => r.status === '已取消❌').length;
  
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-paid').textContent = paid;
  document.getElementById('stat-cancel').textContent = cancel;
}

// =============================================
// 報名卡片渲染（原有邏輯）
// =============================================
function renderRegistrations() {
  const list = document.getElementById('reg-list');
  const filtered = adminData.filter(r => {
    if (currentStatus === 'all') return true;
    if (currentStatus === 'pending') return r.status === '待確認';
    if (currentStatus === 'paid') return r.status === '已繳費✅';
    if (currentStatus === 'cancel') return r.status === '已取消❌';
  });
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">沒有報名記錄</div>';
    return;
  }
  
  list.innerHTML = filtered.map((r, idx) => {
    const statusClass = r.status === '已繳費✅' ? 'paid' : r.status === '待確認' ? 'pending' : 'cancel';
    const statusLabel = r.status === '已繳費✅' ? '已繳費' : r.status === '待確認' ? '待繳費' : '已取消';
    const statusBgClass = r.status === '已繳費✅' ? 'status-paid' : r.status === '待確認' ? 'status-pending' : 'status-cancel';
    
    return `
    <div class="reg-card ${statusClass}">
      <div class="reg-top">
        <div class="reg-name">${r.name}</div>
        <div class="reg-status ${statusBgClass}">${statusLabel}</div>
      </div>
      <div class="reg-info">
        <div><b>LINE ID:</b> ${r.line}</div>
        <div><b>訂單:</b> ${r.orderId || '—'}</div>
      </div>
      <div class="reg-slots">${r.slots || '—'}</div>
      <div class="reg-actions">
        ${r.status === '待確認' ? `
          <button class="btn-confirm" onclick="confirmPayment('${r.orderId}')">✓ 確認繳費</button>
        ` : ''}
        ${r.status !== '已取消❌' ? `
          <button class="btn-invoice" onclick="showInvoice('${r.name}', ${idx})">📋 繳費單</button>
        ` : ''}
      </div>
    </div>
    `;
  }).join('');
}

function filterStatus(status) {
  currentStatus = status;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderRegistrations();
}

// =============================================
// 課程儀表板
// =============================================
async function loadSchedule() {
  try {
    const response = await fetch(`${GAS_URL}?action=getSchedule&pass=${ADMIN_PASS}`);
    scheduleData = await response.json();
    renderSchedule();
  } catch (err) {
    console.error('Error loading schedule:', err);
  }
}

function renderSchedule() {
  const grid = document.getElementById('schedule-grid');
  
  let filtered = scheduleData;
  if (currentScheduleMonth !== 'all') {
    filtered = scheduleData.filter(s => s.date.startsWith(currentScheduleMonth));
  }
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">沒有課程</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(course => {
    const studentListHtml = course.students.length > 0
      ? course.students.map(s => `<div class="student-item student-paid">✓ ${s.name}</div>`).join('')
      : '<div style="font-size:12px;color:#999;">暫無報名</div>';
    
    return `
    <div class="course-card">
      <div class="course-header">
        <div class="course-date">${course.date}(${course.day})</div>
        <div class="course-info">${course.time}</div>
      </div>
      <div class="course-body">
        <div class="course-meta">
          <div>🎾 <b>${course.courseName}</b></div>
          <div>👨‍🏫 教練：<b>${course.coach}</b></div>
          <div>🏢 場地：<b>${course.courtDisplay}</b></div>
          <div>👥 報名：<b>${course.studentCount} / ${course.totalCapacity} 人</b></div>
        </div>
        <div class="student-list">${studentListHtml}</div>
        <div class="course-actions">
          <button class="btn-small secondary" onclick="showReminder('${course.slotKey}')">📢 複製提醒</button>
          <button class="btn-small secondary" onclick="editAttendance('${course.slotKey}')">✏️ 編輯出席</button>
          <button class="btn-small danger" onclick="markCourseCancel('${course.slotKey}')">❌ 停課</button>
        </div>
      </div>
    </div>
    `;
  }).join('');
}

function filterScheduleMonth(month) {
  currentScheduleMonth = month;
  document.querySelectorAll('#tab-schedule .filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderSchedule();
}

// =============================================
// 提醒訊息
// =============================================
async function showReminder(slotKey) {
  try {
    const response = await fetch(`${GAS_URL}?action=getReminderMessage&slotKey=${slotKey}`);
    const result = await response.json();
    reminderMessageCache = result.message;
    document.getElementById('reminder-content').textContent = result.message;
    document.getElementById('reminder-modal').classList.add('open');
  } catch (err) {
    console.error('Error:', err);
  }
}

function closeReminder() {
  document.getElementById('reminder-modal').classList.remove('open');
}

function copyReminderText() {
  navigator.clipboard.writeText(reminderMessageCache).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✅ 已複製！';
    setTimeout(() => btn.textContent = orig, 1800);
  });
}

// =============================================
// 實際上課表單
// =============================================
async function loadAttendanceForm() {
  const dateSelect = document.getElementById('attendance-date');
  
  // 從 scheduleData 提取日期列表
  const uniqueDates = [...new Set(scheduleData.map(s => s.date + '(' + s.day + ')'))].sort();
  
  dateSelect.innerHTML = '<option value="">— 選擇日期 —</option>' +
    uniqueDates.map(date => `<option value="${date}">${date}</option>`).join('');
}

function loadAttendanceSlots() {
  const dateVal = document.getElementById('attendance-date').value;
  const slotSelect = document.getElementById('attendance-slot');
  const studentDiv = document.getElementById('attendance-students');
  
  if (!dateVal) {
    slotSelect.innerHTML = '<option value="">— 選擇時段 —</option>';
    studentDiv.innerHTML = '';
    return;
  }
  
  const [date, day] = dateVal.split('(');
  const slots = scheduleData.filter(s => s.date === date);
  
  slotSelect.innerHTML = '<option value="">— 選擇時段 —</option>' +
    slots.map(s => `<option value="${s.slotKey}">${s.time} - ${s.courseName}</option>`).join('');
  
  // 當選擇時段時，顯示出席人員複選框
  slotSelect.onchange = () => {
    const selectedSlotKey = slotSelect.value;
    if (!selectedSlotKey) {
      studentDiv.innerHTML = '';
      return;
    }
    
    const course = scheduleData.find(s => s.slotKey === selectedSlotKey);
    if (!course) return;
    
    const html = `
      <label class="form-label">選擇出席學生</label>
      <div class="checkbox-group">
        ${course.students.map((s, idx) => `
          <div class="checkbox-item">
            <input type="checkbox" id="student-${idx}" name="attending-student" value="${s.name}">
            <label for="student-${idx}">${s.name}</label>
          </div>
        `).join('')}
      </div>
    `;
    
    studentDiv.innerHTML = html;
  };
}

function saveAttendance() {
  const slotKey = document.getElementById('attendance-slot').value;
  const notes = document.getElementById('attendance-notes').value;
  
  if (!slotKey) {
    alert('請選擇課程時段');
    return;
  }
  
  const attending = Array.from(document.querySelectorAll('input[name="attending-student"]:checked'))
    .map(el => el.value);
  
  const course = scheduleData.find(s => s.slotKey === slotKey);
  const absent = course.students.filter(s => !attending.includes(s.name)).map(s => s.name);
  
  // 模擬保存（實際應該調用 GAS 函數）
  const msg = document.getElementById('attendance-msg');
  msg.innerHTML = `<span style="color:#16a34a;">✅ 上課記錄已保存！出席 ${attending.length} 人，缺席 ${absent.length} 人</span>`;
  
  // 重置表單
  setTimeout(() => {
    document.getElementById('attendance-date').value = '';
    document.getElementById('attendance-slot').value = '';
    document.getElementById('attendance-notes').value = '';
    document.getElementById('attendance-students').innerHTML = '';
    msg.innerHTML = '';
  }, 2000);
}

function editAttendance(slotKey) {
  const course = scheduleData.find(s => s.slotKey === slotKey);
  if (!course) return;
  
  // 切換到實際上課分頁並自動填入
  switchTab('attendance');
  
  // 找到對應的日期並選擇
  const dateOption = document.getElementById('attendance-date');
  const targetDate = course.date + '(' + course.day + ')';
  dateOption.value = targetDate;
  loadAttendanceSlots();
  
  setTimeout(() => {
    document.getElementById('attendance-slot').value = slotKey;
    document.getElementById('attendance-slot').onchange();
  }, 100);
}

// =============================================
// 停課表單
// =============================================
function loadCancellationForm() {
  const datesDiv = document.getElementById('cancellation-dates');
  
  const html = scheduleData.map(course => `
    <div class="checkbox-item">
      <input type="checkbox" name="cancel-date" value="${course.slotKey}" data-date="${course.date}" data-course="${course.courseName}">
      <label>${course.date}(${course.day}) ${course.time} - ${course.courseName}</label>
    </div>
  `).join('');
  
  datesDiv.innerHTML = html || '<div style="color:#999;">沒有課程</div>';
}

function previewCancellation() {
  const reason = document.querySelector('input[name="cancel-reason"]:checked')?.value;
  const selectedSlots = Array.from(document.querySelectorAll('input[name="cancel-date"]:checked')).map(el => el.value);
  
  if (!reason) {
    alert('請選擇停課原因');
    return;
  }
  
  if (selectedSlots.length === 0) {
    alert('請選擇停課日期');
    return;
  }
  
  // 模擬計算退費
  const preview = document.getElementById('refund-preview');
  
  let totalRefund = 0;
  const refundItems = [];
  
  adminData.forEach(reg => {
    if (reg.status === '已繳費✅') {
      // 簡化邏輯：假設每個停課日期退 $500-600
      selectedSlots.forEach(() => {
        totalRefund += 550;
      });
      refundItems.push(`${reg.name}: 退費 $${550 * selectedSlots.length}`);
    }
  });
  
  preview.innerHTML = `
    <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:12px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;">📊 退費預覽</div>
      <div style="font-size:12px;line-height:1.8;color:#666;">
        ${refundItems.join('<br>')}
      </div>
      <div style="margin-top:8px;font-size:13px;font-weight:700;color:#f59e0b;">
        總退費：$${totalRefund}
      </div>
    </div>
  `;
}

function saveCancellation() {
  const reason = document.querySelector('input[name="cancel-reason"]:checked')?.value;
  const selectedSlots = Array.from(document.querySelectorAll('input[name="cancel-date"]:checked')).map(el => el.value);
  
  if (!reason || selectedSlots.length === 0) {
    alert('請完成所有必填項目');
    return;
  }
  
  const msg = document.getElementById('cancellation-msg');
  msg.innerHTML = `<span style="color:#16a34a;">✅ 已標記 ${selectedSlots.length} 堂課程停課，退費已記錄！</span>`;
  
  // 重置表單
  setTimeout(() => {
    document.querySelectorAll('input[name="cancel-reason"]').forEach(el => el.checked = false);
    document.querySelectorAll('input[name="cancel-date"]').forEach(el => el.checked = false);
    document.getElementById('refund-preview').innerHTML = '';
    msg.innerHTML = '';
  }, 2000);
}

function markCourseCancel(slotKey) {
  const course = scheduleData.find(s => s.slotKey === slotKey);
  if (!course) return;
  
  switchTab('cancellation');
  
  setTimeout(() => {
    const checkbox = document.querySelector(`input[name="cancel-date"][value="${slotKey}"]`);
    if (checkbox) {
      checkbox.checked = true;
    }
  }, 100);
}
